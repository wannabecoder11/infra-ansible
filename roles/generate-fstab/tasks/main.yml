
- name: create /mnt points | Debian based systems
  file:
    dest: "{{ item.path }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: 0777
  with_items: 
    - "{{ mountpoints | d([])}}"
  when: ansible_os_family == 'Debian'


- name: create /mnt points | Arch & RedHat based systems
  file:
    dest: "{{ item.path }}"
    state: directory
    owner: nobody
    group: nobody
    mode: 0777
  with_items: 
    - "{{ mountpoints | d([])}}"
  when: ansible_os_family == 'RedHat' or ansible_os_family == 'Archlinux'

- name: mount disks
  mount:
    name: "{{ item.path }}"
    src: "{{ item.diskbyid }}"
    fstype: "{{ item.fs }}"
    opts: "{{ item.opts }}"
    # change to 'mounted' to auto mount
    state: present
  with_items:
    - "{{ mountpoints | d([])}}"
  when: item.path != '/mnt/storage'


- name: mount mergerfs array
  mount:
    name: "{{ item.mountpoint }}"
    src: "{{ item.source }}"
    opts: "{{ item.opts }}"
    fstype: "{{ item.fs }}"
    # change to 'mounted' to auto mount
    state: present
  with_items:
    - "{{ fstab_mergerfs | d([])}}"